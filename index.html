<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار حقوق انسان </title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: linear-gradient(45deg, #ff7675, #fdcb6e, #00cec9, #6c5ce7);
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-top: 110px;
        }

        /* شريط النتيجة الثابت في الأعلى */
        .score-board {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .counters-container {
            display: flex;
            gap: 30px;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .score-item.correct-count { color: #34d399; }
        .score-item.wrong-count { color: #f87171; }

        .user-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 22px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .user-tag-name {
            background: var(--accent-glow);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: tagGradientText 3s infinite linear;
        }

        @keyframes tagGradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* نافذة الترحيب المنبثقة */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .welcome-popup {
            background: #1e1b4b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .start-btn {
            background: linear-gradient(45deg, #6366f1, #a855f7);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }

        .welcome-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 35px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--card-border);
            border-radius: 16px;
        }

        /* عناوين الأقسام الرئيسية */
        .section-heading {
            font-size: 1.8rem;
            color: #ffffff;
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #6366f1;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .question-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .question-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 1rem;
            color: #cbd5e1;
            cursor: pointer;
            text-align: right;
            transition: all 0.2s ease;
            width: 100%;
        }

        .option-btn:hover:not([disabled]) {
            background-color: rgba(99, 102, 241, 0.15);
            border-color: #6366f1;
            color: #ffffff;
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
        }

        .option-btn.wrong {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: var(--error-color) !important;
        }

        .correction-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.9);
            border-right: 4px solid #a855f7;
            border-radius: 6px;
            font-size: 1rem;
            color: #e2e8f0;
            display: none;
            line-height: 1.6;
        }
        
        .correction-box.show-info {
            display: block;
        }

        .tf-container {
            display: flex;
            gap: 15px;
        }

        .tf-container .option-btn {
            text-align: center;
            font-weight: bold;
        }

        .disabled {
            pointer-events: none;
            opacity: 0.75;
        }

        .footer-admin-card {
            margin-top: 60px;
            text-align: center;
            padding: 25px;
            background: #0f172a;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .footer-admin-name {
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<div class="welcome-overlay" id="welcomeOverlay">
    <div class="welcome-popup">
        <h2 style="font-size: 2.5rem; background: var(--accent-glow); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome!</h2>
        <p style="color: var(--text-muted); font-size: 1.2rem;">جاهز للاختبار المنظم بالأقسام يا <strong>الطالب</strong>؟</p>
        <button class="start-btn" onclick="closeWelcome()">ابدأ الآن</button>
    </div>
</div>

<div class="score-board">
    <div class="counters-container">
        <div class="score-item correct-count">الإجابات الصحيحة: <span id="correct-score">0</span></div>
        <div class="score-item wrong-count">عدد الأخطاء: <span id="wrong-score">0</span></div>
    </div>
    <div class="user-tag">
        <span class="user-tag-name">Moza</span>
        <span>🔥</span>
    </div>
</div>

<div class="container">
    <header>
        <h1>بنك الأسئلة الشامل المنظم</h1>
        <p>  اختبار حقوق انسان    </p>
    </header>

    <div class="section-heading">📝 القسم الأول: أسئلة الصواب والخطأ (متلغبطة بالداخل)</div>

    <div class="section-heading">🎯 القسم الثاني: أسئلة الاختيار من متعدد (متلغبطة بالداخل)</div>

    <div class="footer-admin-card">
        <p style="color:#e2e8f0; margin:0;">👑 تحت إشراف أدمن الجروب: <span class="footer-admin-name">Moza</span></p>
    </div>
</div>

        document.getElementById('welcomeOverlay').classList.add('hidden');

        document.getElementById('wrong-score').innerText = totalWrong;
    }

 const trueFalseQuestions = [
  { id: "tf-1", type: "tf", question: "ظهرت فكرة حماية حقوق الإنسان في صور قواعد عرفية.", answer: true },

  { id: "tf-9", type: "tf", question: "تُعد حرفة العطارة من أكثر الحرف التي مارستها المرأة في العصر العباسي.", answer: false },
  { id: "tf-10", type: "tf", question: "تعتبر التجارة من أقدم المهن والحرف التي اشتغلت بها المرأة العربية.", answer: true },
  { id: "tf-11", type: "tf", question: "تعد حقوق الإنسان لصيقة بالإنسان مرتبطة به وجوداً وعدماً.", answer: true },
  { id: "tf-12", type: "tf", question: "تعود جذور الحقوق السياسية إلى القرن الخامس عشر مع الثورة الفرنسية.", answer: false },

  { id: "tf-16", type: "tf", question: "لكل شخص الحق في حرية الرأي والتعبير.", answer: true },

    // دالة الخلط العشوائي
    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function renderQuizSections() {
        const tfContainer = document.getElementById('tf-section-container');
        const mcContainer = document.getElementById('mc-section-container');

        // خلط كل مصفوفة على حدة بشكل مستقل ومفاجئ!
        const shuffledTF = shuffleArray(trueFalseQuestions);
        const shuffledMC = shuffleArray(multipleChoiceQuestions);

        // 1. بناء قسم الصح والخطأ
        let tfHtml = '';
        shuffledTF.forEach((q, index) => {
            tfHtml += `
                <div class="question-card" id="card-${q.id}">
                    <div class="question-text">${index + 1}. ${q.question}</div>
                    <div class="options-container tf-container">
                        <button class="option-btn" onclick="checkTrueFalse('${q.id}', true, this)">صح</button>
                        <button class="option-btn" onclick="checkTrueFalse('${q.id}', false, this)">خطأ</button>
                    </div>
                    <div class="correction-box" id="correction-${q.id}"><strong>التصحيح والتعليل الفوري:</strong> ${q.correction}</div>
                </div>
            `;
        });
        tfContainer.innerHTML = tfHtml;

        // 2. بناء قسم الاختيار من متعدد
        let mcHtml = '';
        shuffledMC.forEach((q, index) => {
            mcHtml += `
                <div class="question-card" id="card-${q.id}">
                    <div class="question-text">${index + 1}. ${q.question}</div>
                    <div class="options-container">
            `;
            q.options.forEach(opt => {
                mcHtml += `<button class="option-btn" onclick="checkMultipleChoice('${q.id}', '${opt}', this)">${opt}</button>`;
            });
            mcHtml += `
                    </div>
                    <div class="correction-box" id="correction-${q.id}"><strong>الإجابة الصحيحة هي:</strong> [ ${q.answer} ]</div>
                </div>
            `;
        });
        mcContainer.innerHTML = mcHtml;
    }

    function checkTrueFalse(id, userAns, btn) {
        const question = trueFalseQuestions.find(q => q.id === id);
        const parent = btn.parentElement;
        const buttons = parent.querySelectorAll('.option-btn');
        const infoBox = document.getElementById(`correction-${id}`);
        
        buttons.forEach(b => b.classList.add('disabled'));
        
        if (userAns === question.answer) {
            btn.classList.add('correct');
            totalCorrect++;
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => {
                if ((b.innerText === 'صح' && question.answer === true) || (b.innerText === 'خطأ' && question.answer === false)) {
                    b.classList.add('correct');
                }
            });
            totalWrong++;
        }
        
        if (infoBox) infoBox.classList.add('show-info');
        updateScoreBoard();
    }

    function checkMultipleChoice(id, userAns, btn) {
        const question = multipleChoiceQuestions.find(q => q.id === id);
        const parent = btn.parentElement;
        const buttons = parent.querySelectorAll('.option-btn');
        const infoBox = document.getElementById(`correction-${id}`);
        
        buttons.forEach(b => b.classList.add('disabled'));
        
        if (userAns === question.answer) {
            btn.classList.add('correct');
            totalCorrect++;
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => {
                if (b.innerText === question.answer) {
                    b.classList.add('correct');
                }
            });
            totalWrong++;
        }
        
        if (infoBox) infoBox.classList.add('show-info');
        updateScoreBoard();
    }

    // تشغيل الخلط وفصل الأقسام فور تحميل الصفحة
    window.onload = renderQuizSections;
