        .option-btn.correct { background: #22c55e !important; }
        .option-btn.wrong { background: #ef4444 !important; }

    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function renderQuizSections() {
        const tfContainer = document.getElementById('tf-section-container');
        const mcContainer = document.getElementById('mc-section-container');

        let tfHtml = '<h3>أسئلة الصح والخطأ:</h3>';
        shuffleArray(trueFalseQuestions).forEach((q, index) => {
            tfHtml += `
                <div class="question-card" id="card-${q.id}">
                    <div class="question-text">${index + 1}. ${q.question}</div>
                    <button class="option-btn" onclick="checkTrueFalse('${q.id}', true, this)">صح</button>
                    <button class="option-btn" onclick="checkTrueFalse('${q.id}', false, this)">خطأ</button>
                    <div class="correction-box" id="correction-${q.id}"><strong>الإجابة الصحيحة:</strong> ${q.answer ? 'صح' : 'خطأ'}</div>
                </div>
            `;
        });
        tfContainer.innerHTML = tfHtml;

        let mcHtml = '<h3>أسئلة الاختيار من متعدد:</h3>';
        shuffleArray(multipleChoiceQuestions).forEach((q, index) => {
            mcHtml += `<div class="question-card" id="card-${q.id}"><div class="question-text">${index + 1}. ${q.question}</div>`;
            q.options.forEach(opt => {
                mcHtml += `<button class="option-btn" onclick="checkMultipleChoice('${q.id}', '${opt}', this)">${opt}</button>`;
            });
            mcHtml += `<div class="correction-box" id="correction-${q.id}"><strong>الإجابة الصحيحة هي:</strong> [ ${q.answer} ]</div></div>`;
        });
        mcContainer.innerHTML = mcHtml;
    }

    function checkTrueFalse(id, userAns, btn) {
        const question = trueFalseQuestions.find(q => q.id === id);
        const parent = btn.parentElement;
        const buttons = parent.querySelectorAll('.option-btn');
        buttons.forEach(b => b.classList.add('disabled'));
        
        if (userAns === question.answer) { btn.classList.add('correct'); totalCorrect++; }
        else { btn.classList.add('wrong'); totalWrong++; }
        
        document.getElementById(`correction-${id}`).classList.add('show-info');
        updateScoreBoard();
    }

    function checkMultipleChoice(id, userAns, btn) {
        const question = multipleChoiceQuestions.find(q => q.id === id);
        const parent = btn.parentElement;
        const buttons = parent.querySelectorAll('.option-btn');
        buttons.forEach(b => b.classList.add('disabled'));
        
        if (userAns === question.answer) { btn.classList.add('correct'); totalCorrect++; }
        else { btn.classList.add('wrong'); totalWrong++; }
        
        document.getElementById(`correction-${id}`).classList.add('show-info');
        updateScoreBoard();
    }

    renderQuizSections();
</script>
